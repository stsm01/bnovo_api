  -
    name: 'Профессионал -> Вебхуки'
    description: "\nМетоды для работы с вебхуками.\n\nРеализованы типы вебхуков: booking - получение событий (CRUD) бронирования и plans_data_update - изменение цены в тарифах\n\nДля получения событий, необходимо создать подписчика и указать url, на который будут отправлятся события.\nСобытие отправляется POST запросом. Протестировать событие можно в соответствующих эндпоинтах.\n\nВажно! Подключение к вебхукам занимает 24 часа (с момента создания подписчика). Тестовые события можно отправлять сразу."
