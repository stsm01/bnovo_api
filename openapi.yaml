  /api/v1/reports/adrRevPar:
    get:
      summary: 'Получить отчет adr/revPar'
      operationId: AdrrevPar
      description: "ADR (Average daily room rate) — средняя цена за номер/ночь. Вычисляется путем деления выручки от продажи номерного фонда на количество проданных номеров за отчетный период.\nЗа выручку принимается объем денежных средств, вне зависимости получены они или нет, за оказанные услуги. В выручку от продажи номерного фонда не входит стоимость доп. услуг, включенных в тариф, например, питания.\nRevPAR (Revenue per available room per day) — доход на доступный номер в день. Высчитывается делением выручки от продажи номеров на общее количество доступных номеров.\nПри построении отчета на будущее, для расчета берется стоимость забронированных услуг проживания, а не выручка, так как услуги еще не оказаны."
      parameters:
        -
          in: query
          name: date_from
          description: 'Дата начала. Поле должно быть раньше date_to. Формат: Y-m-d'
          example: '2025-05-29'
          required: true
          schema:
            type: string
            description: 'Дата начала. Поле должно быть раньше date_to. Формат: Y-m-d'
            example: '2025-05-29'
            nullable: false
        -
          in: query
          name: date_to
          description: 'Дата окончания. Максимальный период выборки - 60 дней. Поле должно быть позже date_from. Формат: Y-m-d'
          example: '2025-05-30'
          required: true
          schema:
            type: string
            description: 'Дата окончания. Максимальный период выборки - 60 дней. Поле должно быть позже date_from. Формат: Y-m-d'
            example: '2025-05-30'
            nullable: false
        -
          in: query
          name: room_types
          description: 'Список ID типов номеров через запятую. Максимальное кол-во 20'
          example: '1,2,3'
          required: true
          schema:
            type: string
            description: 'Список ID типов номеров через запятую. Максимальное кол-во 20'
            example: '1,2,3'
            nullable: false
