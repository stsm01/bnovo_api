  /api/v1/bookings:
    get:
      summary: 'Получить бронирования в указанный промежуток'
      operationId: ''
      description: ''
      parameters:
        -
          in: query
          name: date_from
          description: "Дата начала выборки бронирований.\nПоле должно быть раньше date_to. Формат: Y-m-d или Y-m-d H:i:s"
          example: '2025-05-29 или 2025-05-29 14:30:00'
          required: true
          schema:
            type: string
            description: "Дата начала выборки бронирований.\nПоле должно быть раньше date_to. Формат: Y-m-d или Y-m-d H:i:s"
            example: '2025-05-29 или 2025-05-29 14:30:00'
            nullable: false
        -
          in: query
          name: date_to
          description: "Дата окончания выборки бронирований.\nПоле должно быть позже date_from. Формат: Y-m-d или Y-m-d H:i:s"
          example: '2025-05-30 или 2025-05-30 23:59:59'
          required: true
          schema:
            type: string
            description: "Дата окончания выборки бронирований.\nПоле должно быть позже date_from. Формат: Y-m-d или Y-m-d H:i:s"
            example: '2025-05-30 или 2025-05-30 23:59:59'
            nullable: false
        -
          in: query
          name: data_type
          description: "Тип запрашиваемых данных. По-умолчанию (без параметра) отображает все бронирования (по дате создания). Может принимать значения: <br>\ncheckmate - как на шахматке (booking.arrival <= date_to AND booking.departure >= date_from) <br>\nnew - новые (booking.create_date <= date_to AND booking.create_date >= date_from AND booking.status_id IN new, waiting) <br>\nliving - проживающие (booking.departure <= date_to AND booking.arrival >= date_from AND booking.status_id IN check_in) <br>\ncheckedIn - заезд (booking.arrival <= date_to AND booking.arrival >= date_from AND booking.status_id IN new, waiting) <br>\ncheckedOut - выезд (booking.departure <= date_to AND booking.departure >= date_from AND booking.status_id IN new, waiting, check_in) <br>\ncancelled - отмененные (booking.cancel_date <= date_to AND booking.cancel_date >= date_from AND booking.status_id IN cancelled) <br>\nexited - выехали (booking.departure <= date_to AND booking.departure >= date_from AND booking.status_id IN check_out) <br>\nchanged - измененные (booking.update_date <= date_to AND booking.update_date >= date_from)"
          example: checkmate
          required: false
          schema:
            type: string
            description: "Тип запрашиваемых данных. По-умолчанию (без параметра) отображает все бронирования (по дате создания). Может принимать значения: <br>\ncheckmate - как на шахматке (booking.arrival <= date_to AND booking.departure >= date_from) <br>\nnew - новые (booking.create_date <= date_to AND booking.create_date >= date_from AND booking.status_id IN new, waiting) <br>\nliving - проживающие (booking.departure <= date_to AND booking.arrival >= date_from AND booking.status_id IN check_in) <br>\ncheckedIn - заезд (booking.arrival <= date_to AND booking.arrival >= date_from AND booking.status_id IN new, waiting) <br>\ncheckedOut - выезд (booking.departure <= date_to AND booking.departure >= date_from AND booking.status_id IN new, waiting, check_in) <br>\ncancelled - отмененные (booking.cancel_date <= date_to AND booking.cancel_date >= date_from AND booking.status_id IN cancelled) <br>\nexited - выехали (booking.departure <= date_to AND booking.departure >= date_from AND booking.status_id IN check_out) <br>\nchanged - измененные (booking.update_date <= date_to AND booking.update_date >= date_from)"
