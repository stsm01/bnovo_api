openapi: 3.0.3
info:
  title: 'Открытое API Bnovo PMS'
  description: "# Открытый API Bnovo\n\n## Общая информация\nAPI Bnovo – это программный интерфейс для интеграции. Позволяет внешним системам и сервисам безопасно обмениваться данными с Bnovo PMS в автоматическом режиме. С помощью API Bnovo отели и отраслевые компании могут интегрировать данные о бронированиях, номерах, платежах и гостях в собственные IT решения и системы (интранет, CRM, BI и др.).\n\nИнструкция по подключению: https://help.bnovo.ru/knowledgebase/открытое-api-bnovo-pms/\n\n## Доступные версии API Bnovo\n\n### API «Старт»\nСтартовая бесплатная версия API обеспечивает односторонний доступ к данным через GET эндпоинты и предназначена для получения актуальной информации о бронированиях из системы Bnovo PMS.\n\n### API «Профессионал»\nНовый уровень интеграционных возможностей. Профессиональная версия поддерживает двусторонний обмен данными через GET, PUT, POST эндпоинты, а также включает функцию вебхуков. Позволяет работать с данными о гостях, платежах, отчетности и дополнительных услугах. Бизнес-инструмент помогает не просто получать данные, а создавать на их основе собственные сервисы и встраивать Bnovo в сложные IT решения.\n\n## Как работает API Bnovo\nУправление интеграциями происходит в разделе **Bnovo Octopus** → **API доступ**. Здесь можно ознакомиться с функционалом доступных версий API (стартовой и профессиональной), а также получить уникальные API ключи и права доступа, необходимые для взаимодействия с выбранной версией. После настройки доступа вы сможете отправлять авторизованные запросы и получать необходимую информацию из Bnovo PMS автоматически.\n\n## Первое подключение\nПодключение API Bnovo доступно пользователям с типом аккаунта «Владелец». Откройте раздел Bnovo Octopus и пройдите авторизацию /api/v1/auth для получения JWT токена и корректной работы.\n\n## Обновить API ключ\nВы всегда можете обновить ключ, если данные пользователя или токены были скомпрометированы. Переподключение доступно после первой авторизации через /api/v1/auth.\n\nКнопка в интерфейсе **Обновить API ключ** генерирует новый пароль, отзывает все токены и завершает сессии на всех устройствах.\n\nДля продолжения работы повторно пройдите авторизацию, указав обновленные данные для подключения.\n\nИнструкция: https://help.bnovo.ru/knowledgebase/открытое-api-bnovo-pms/#section5\n\n## Количество запросов\nДля запроса на аутентификацию `/api/v1/auth` и обновления ключа API в системе установлено ограничение:\n - **10 запросов в минуту**\n\nДля всех остальных API запросов:\n- **30 запросов за 10 секунд**\n- **300 запросов за 5 минут**\n- **1000 запросов в час**\n- **10 000 запросов в сутки**\n\nПри превышении лимита появляется ошибка **429 Too Many Requests**\n\n## Устранение неполадок\n### 401 Unauthorized (Несанкционированный доступ)\nДля получения токена снова пройдите авторизацию в методе `/api/v1/auth`.\n### 429 Too Many Requests (Слишком много запросов)\nПревышен лимит по количеству запросов. Попробуйте отправить повторный запрос через 1 минуту.\n### Ошибки при создании или обновлении ключа через интерфейс\nОбновите страницу и повторите попытку через 30 секунд.\n"
  version: 1.0.0
servers:
  -
    url: 'https://api.pms.bnovo.ru'
tags:
  -
    name: Авторизация
    description: "\nМетоды для авторизации и управления токенами.\n\nВ приложении реализована JWT авторизация.\nДля получения токена, необходимо отправить запрос на метод POST /api/v1/auth, в теле запроса передать параметры, полученные в личном кабинете https://online.bnovo.ru/octopus в форме \"API ключи\".\nТокен имеет ограниченное время жизни. Если срок жизни токена истек или возвращаемый код ошибки 401, нужно получить новый токен.\nЧтобы получить новый токен, нужно отправить повторный запрос на POST /api/v1/auth\n\nПосле получения токена, в запросах необходимо передавать заголовок Authorization со значением Bearer {токен}.\nНапример Authorization Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJodHRwOi8vMC4wLjAuMDoyMDgwL2FwaS92MS9hdXRoIiwiaWF0IjoxNzQ3ODEwNTY4LCJleHAiOjE3ODQwOTg1NjgsIm5iZiI6MTc0NzgxMDU2OCwianRpIjoialNkNzhGT2tEd0FDUk5rMiIsInN1YiI6IjIiLCJwcnYiOiIyM2JkNWM4OTQ5ZjYwMGFkYjM5ZTcwMWM0MDA4NzJkYjdhNTk3NmY3In0.MQrgTy7KyJURwFoq3kiq0Y6RKVSIEAXvY66UM6DHq5o"
